<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container w-75 mx-auto p-3 border bg-light">
    <h2>Produits à acheter</h2>
    <table id="list" class="table table-hover">
    <thead>
        <tr><th>Nom du produit</th>
    <th>Prix unitaire</th>
    <th>Qunatité</th></tr></thead>
    <tbody></tbody>
</table>
<div class="my-3 p-2 border shadow rounded">
    Paimenent par : 
    <div class="form-check form-check-inline">
     <input type="radio" name="mode" id="carte" class="form-check-input">
     <label for="carte" class="form-check-label">Carte Bancaire </label>
    </div>
 <div class="form-check form-check-inline">
     <input type="radio" name="mode" id="cheque" checked class="form-check-input">
     <label for="cheque" class="form-check-label">Chéque </label>
    </div>
    Numero de la carte : <input type="text" id="numCarte" disabled><br>
    <button type="button" id="calculer" class="btn btn-primary">Envoyer</button>
</div>
<div class="divRes d-none">
Merci de votre visite, le montant total de votre commande est : <input type="text" id="res" readonly>
</div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

   <script type="text/javascript">
      //charger lles données d'un fichier json externe
      let produits=[];
      fetch('./data.json').then(res=>res.json()).then(res=>{produits=res


       produits.forEach(function(p,index){
         let newRow=document.createElement('tr');
         newRow.innerHTML=`<td>${p.nom}</td><td>${p.prixU}</td><td><input class="form-control" type="number"value=0 min=0 max=10 /></td>`;
          document.querySelector('#list tbody').appendChild(newRow);

       })
    });//f
       //gérer le clic sur les input type radio
    document.querySelector('#cheque').addEventListener('click',function(){
       document.querySelector('#numCarte').disabled=true; 
    })
 document.querySelector('#carte').addEventListener('click',function(){
       document.querySelector('#numCarte').disabled=false;
    })

    //gérer le clic sur le bouton : envoyer
     document.querySelector('#calculer').onclick=function(e){
       let allTr=document.querySelectorAll('tbody tr');
       let som=0;
       allTr.forEach(function(t,pos){
       som+=parseFloat(t.children[2].children[0].value)*parseFloat(t.children[1].textContent);
       });
       document.querySelector('#res').value=`${som} DH`;
      document.querySelector('.divRes').classList.remove('d-none');
     }
    
   </script>

</body>
</html>
