<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
</head>
<body>
    
    <div class="container w-75 my-4 mx-auto p-3">
        <h2>Liste de notes</h2>
    <table class="table table-bordered">
        <thead><tr><th>Nom</th><th>Note</th></tr></thead>
    <tbody>
        <tr><td>Sara</td><td>15</td></tr>
    <tr><td>Ahmed</td><td>9</td></tr>
    <tr><td>ALi</td><td>11</td></tr>
    </tbody>
    
    </table>
    <button id="check" onclick="check()" class="my-5 btn btn-primary">Verifier</button>
    </div>
    <script type="text/javascript">
        function check(){
        let allTr=document.querySelectorAll('tbody tr');
        allTr.forEach(function(row,pos){
         (parseFloat(row.children[1].textContent)<10)?
             
            row.classList.add('table-danger')
         :
            row.classList.add('table-success');
         

        });

    }
    </script>
</body>
</html>
