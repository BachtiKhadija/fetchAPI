<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercice 1</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">

<div class="container w-75 bg-white p-4 rounded shadow">
  <h3 class="mb-3">Panier de produits</h3>

  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Produit</th>
        <th>Prix (DH)</th>
        <th>Quantité</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Pomme</td>
        <td>5</td>
        <td><input type="number" class="form-control" value="0"></td>
      </tr>
      <tr>
        <td>Banane</td>
        <td>3</td>
        <td><input type="number" class="form-control" value="0"></td>
      </tr>
    </tbody>
  </table>

  <button class="btn btn-primary mb-3" onclick="calculer()">Calculer le total</button>
  <p>Total : <span id="res" class="fw-bold"></span></p>
</div>

<script>
function calculer(){
  let trs = document.querySelectorAll("tbody tr");
  let total = 0;
  trs.forEach(function(tr){
    let prix = parseFloat(tr.children[1].textContent);
    let qte = parseFloat(tr.children[2].children[0].value);
    total += prix*qte;
  });
  document.getElementById("res").textContent = total + " DH";
}
</script>
</body>
</html>
