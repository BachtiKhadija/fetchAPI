<!DOCTYPE html>
<html>

<head>

<title>CRUD Produits</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h2 class="text-center mb-4">Gestion des Produits</h2>

<div class="row mb-4">

<div class="col">
<input type="text" id="name" class="form-control" placeholder="Nom produit">
</div>

<div class="col">
<input type="number" id="price" class="form-control" placeholder="Prix">
</div>

<div class="col">
<input type="text" id="image" class="form-control" placeholder="Image URL">
</div>

<div class="col">
<button class="btn btn-primary w-100" onclick="addProduct()">Ajouter</button>
</div>

</div>

<div class="row" id="productList">

</div>

<script src="script.js"></script>

</body>
</html>
