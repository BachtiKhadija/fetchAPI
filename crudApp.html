<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    
    <div class="container p-3 w-75 mx-auto">
       <table id="myTable" class="table table-bordered">
        <thead><tr><th>Champ1</th><th>champ2</th><th>Action</th></tr></thead>
         <tbody></tbody>
    
    </table>

    </div>
    <script type="text/javascript">
        let items=[]
        fetch("./source.json").then(res=>res.json()).then(res=>{
            items=res;
            display();
            

        });

        function display(){
            let ch='';
            for(let i in items){
           ch+=`<tr><td>${items[i].champ1}</td><td>${items[i].champ2}</td><td><button class="btn btn-danger" onclick="del(${i})">Remove</button></td>`;
            }
            document.querySelector('#myTable tbody').innerHTML=ch;
        }
        function del(pos){
          let parent=document.querySelector('#myTable tbody');

           let itemToDel=parent.children[pos];
           parent.removeChild(itemToDel)

           items.splice(pos,1);
           //display();

        }
    </script>
</body>
</html>
